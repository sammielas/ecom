<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Homelab E-Commerce</title>
<style>
  body { font-family: sans-serif; max-width: 900px; margin: 40px auto; background: #0f1117; color: #e5e5e5; }
  h1 { border-bottom: 2px solid #333; padding-bottom: 10px; }
  h2 { margin-top: 40px; color: #9fd3ff; }
  section { background: #181b24; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
  input, button { padding: 8px; margin: 4px 0; border-radius: 4px; border: 1px solid #444; }
  input { width: 100%; box-sizing: border-box; background: #0f1117; color: #eee; }
  button { background: #3a6ff7; color: white; border: none; cursor: pointer; padding: 10px 16px; }
  button:hover { background: #2a5adf; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  th, td { text-align: left; padding: 8px; border-bottom: 1px solid #333; }
  .status-ok { color: #6fd66f; }
  .status-bad { color: #ff6b6b; }
  pre { background: #0f1117; padding: 10px; border-radius: 4px; overflow-x: auto; }
  .health-row { display: flex; gap: 20px; margin-bottom: 20px; }
  .health-pill { padding: 6px 12px; border-radius: 20px; font-size: 0.85em; }
</style>
</head>
<body>

<h1>🛒 Homelab E-Commerce - GitOps Demo</h1>

<div class="health-row" id="health-row">
  <span class="health-pill" id="health-user">user-service: checking...</span>
  <span class="health-pill" id="health-product">product-service: checking...</span>
  <span class="health-pill" id="health-order">order-service: checking...</span>
</div>

<section>
  <h2>Products</h2>
  <button onclick="loadProducts()">Refresh Products</button>
  <table id="products-table">
    <thead><tr><th>ID</th><th>Name</th><th>Price</th><th>Stock</th></tr></thead>
    <tbody></tbody>
  </table>

  <h3>Add Product</h3>
  <input id="p-name" placeholder="Name">
  <input id="p-price" placeholder="Price" type="number" step="0.01">
  <input id="p-stock" placeholder="Stock" type="number">
  <button onclick="createProduct()">Create Product</button>
</section>

<section>
  <h2>Users</h2>
  <button onclick="loadUsers()">Refresh Users</button>
  <table id="users-table">
    <thead><tr><th>ID</th><th>Username</th><th>Email</th></tr></thead>
    <tbody></tbody>
  </table>

  <h3>Add User</h3>
  <input id="u-username" placeholder="Username">
  <input id="u-email" placeholder="Email">
  <button onclick="createUser()">Create User</button>
</section>

<section>
  <h2>Place Order</h2>
  <input id="o-user-id" placeholder="User ID" type="number">
  <input id="o-product-id" placeholder="Product ID" type="number">
  <input id="o-quantity" placeholder="Quantity" type="number">
  <button onclick="placeOrder()">Place Order</button>
  <pre id="order-result"></pre>
</section>

<script>
const USER_API = "/api/user-service";
const PRODUCT_API = "/api/product-service";
const ORDER_API = "/api/order-service";

async function checkHealth(url, elId, label) {
  const el = document.getElementById(elId);
  try {
    const res = await fetch(`${url}/health`);
    if (res.ok) {
      el.textContent = `${label}: healthy`;
      el.className = "health-pill status-ok";
    } else {
      throw new Error("bad status");
    }
  } catch (e) {
    el.textContent = `${label}: unreachable`;
    el.className = "health-pill status-bad";
  }
}

function refreshHealth() {
  checkHealth(USER_API, "health-user", "user-service");
  checkHealth(PRODUCT_API, "health-product", "product-service");
  checkHealth(ORDER_API, "health-order", "order-service");
}

async function loadProducts() {
  const tbody = document.querySelector("#products-table tbody");
  tbody.innerHTML = "<tr><td colspan='4'>Loading...</td></tr>";
  try {
    const res = await fetch(`${PRODUCT_API}/products`);
    const data = await res.json();
    tbody.innerHTML = data.map(p =>
      `<tr><td>${p.id}</td><td>${p.name}</td><td>$${p.price}</td><td>${p.stock}</td></tr>`
    ).join("") || "<tr><td colspan='4'>No products yet</td></tr>";
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="4">Error: ${e.message}</td></tr>`;
  }
}

async function createProduct() {
  const name = document.getElementById("p-name").value;
  const price = parseFloat(document.getElementById("p-price").value);
  const stock = parseInt(document.getElementById("p-stock").value || "0");
  await fetch(`${PRODUCT_API}/products`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, price, stock })
  });
  loadProducts();
}

async function loadUsers() {
  const tbody = document.querySelector("#users-table tbody");
  tbody.innerHTML = "<tr><td colspan='3'>Loading...</td></tr>";
  try {
    const res = await fetch(`${USER_API}/users`);
    const data = await res.json();
    tbody.innerHTML = data.map(u =>
      `<tr><td>${u.id}</td><td>${u.username}</td><td>${u.email}</td></tr>`
    ).join("") || "<tr><td colspan='3'>No users yet</td></tr>";
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="3">Error: ${e.message}</td></tr>`;
  }
}

async function createUser() {
  const username = document.getElementById("u-username").value;
  const email = document.getElementById("u-email").value;
  await fetch(`${USER_API}/users`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, email })
  });
  loadUsers();
}

async function placeOrder() {
  const user_id = parseInt(document.getElementById("o-user-id").value);
  const product_id = parseInt(document.getElementById("o-product-id").value);
  const quantity = parseInt(document.getElementById("o-quantity").value);
  const resultEl = document.getElementById("order-result");
  resultEl.textContent = "Placing order...";
  try {
    const res = await fetch(`${ORDER_API}/orders`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user_id, product_id, quantity })
    });
    const data = await res.json();
    resultEl.textContent = JSON.stringify(data, null, 2);
  } catch (e) {
    resultEl.textContent = `Error: ${e.message}`;
  }
}

refreshHealth();
loadProducts();
loadUsers();
setInterval(refreshHealth, 10000);
</script>

</body>
</html>
