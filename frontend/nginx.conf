server {
    listen 80;

    # Proxy API calls to the internal services by their Kubernetes/Docker
    # Compose service name. Because both environments use the same service
    # names (user-service, product-service, order-service), this file works
    # unchanged in both places.
    #
    # The trailing slash on both the location and proxy_pass is what tells
    # nginx to strip the matched prefix before forwarding, e.g.:
    #   /api/user-service/health  ->  http://user-service:8000/health

    location /api/user-service/ {
        proxy_pass http://user-service:8000/;
    }

    location /api/product-service/ {
        proxy_pass http://product-service:8000/;
    }

    location /api/order-service/ {
        proxy_pass http://order-service:8000/;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
