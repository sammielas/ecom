# OpenTelemetry Collector - ingestion point for app-emitted traces and
# metrics, fanning out to Tempo and Prometheus. Logs are NOT handled here -
# Promtail (a separate DaemonSet) tails container stdout directly and
# ships to Loki instead, which is simpler and captures every pod's logs,
# not just ones with OTel instrumentation. Keeping the Collector scoped to
# traces+metrics also reduces its resource footprint, which matters on
# CPU-constrained clusters (as low as 1 vCPU on some lab environments).
#
# NOTE: verify against `helm show values open-telemetry/opentelemetry-collector`
# for the chart version you're installing - config schema for the collector
# chart has changed across versions.

mode: deployment   # a single Collector instance is fine for this scope (vs. daemonset/sidecar patterns at larger scale)

image:
  repository: otel/opentelemetry-collector-contrib

resources:
  requests:
    cpu: 30m
    memory: 128Mi
  limits:
    cpu: 150m
    memory: 256Mi

config:
  extensions:
    health_check:
      endpoint: 0.0.0.0:13133

  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    batch: {}   # batches telemetry before export - reduces network overhead vs. sending one-by-one

  exporters:
    # Traces -> Tempo, via OTLP (Tempo natively speaks OTLP)
    otlp/tempo:
      endpoint: tempo.monitoring.svc.cluster.local:4317
      tls:
        insecure: true
      timeout: 30s

    # Metrics -> exposed here for Prometheus to scrape (pull model, matching
    # how Prometheus already scrapes everything else in this cluster - more
    # consistent than mixing push and pull for metrics specifically)
    prometheus:
      endpoint: 0.0.0.0:8889

  service:
    extensions: [health_check]
    pipelines:
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [otlp/tempo]
      metrics:
        receivers: [otlp]
        processors: [batch]
        exporters: [prometheus]

# Expose the Prometheus-format metrics endpoint (8889) so a ServiceMonitor
# can scrape it - see the ServiceMonitor manifest applied separately below.
ports:
  prometheus:
    enabled: true
    containerPort: 8889
    servicePort: 8889
    protocol: TCP
