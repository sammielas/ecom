prometheus:
  prometheusSpec:
    retention: 15d
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
    walCompression: true
    podAntiAffinity: soft

grafana:
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  adminPassword: admin
  additionalDataSources:
    # IMPORTANT: Grafana's datasource provisioning only fully applies
    # jsonData (like tracesToLogsV2 below) when a datasource is created
    # for the FIRST time. If you change jsonData here on a datasource that
    # already exists in Grafana's database, `helm upgrade` alone will NOT
    # update it - the old config silently persists. To force it to pick up
    # changes, wipe Grafana's database and let it re-provision fresh:
    #   kubectl exec -n monitoring deploy/prometheus-grafana -c grafana -- rm -f /var/lib/grafana/grafana.db
    #   kubectl delete pod -n monitoring -l app.kubernetes.io/name=grafana
    - name: Loki
      type: loki
      uid: loki
      url: http://loki-gateway
      access: proxy
      jsonData:
        derivedFields:
          - datasourceUid: tempo
            matcherRegex: 'trace_id=(\w+)'
            name: TraceID
            url: '$${__value.raw}'
    - name: Tempo
      type: tempo
      uid: tempo
      url: http://tempo:3200
      access: proxy
      jsonData:
        tracesToLogsV2:
          datasourceUid: loki
          spanStartTimeShift: '-5m'
          spanEndTimeShift: '5m'
          filterByTraceID: false
          filterBySpanID: false
          tags:
            - key: 'service.name'
              value: 'service_name'
        serviceMap:
          datasourceUid: prometheus

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi
    secrets:
      - slack-webhook

  config:
    global: {}
    route:
      receiver: 'slack-notifications'
      group_by: ['alertname', 'exported_job']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - matchers:
            - severity = "critical"
          receiver: 'slack-critical'
          repeat_interval: 15m
        - matchers:
            - alertname = "Watchdog"
          receiver: 'null'
    receivers:
      - name: 'null'
      - name: 'slack-notifications'
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/slack-webhook/webhook-url
            channel: '#alerts'
            send_resolved: true
            title: '{{ .GroupLabels.alertname }}'
            text: >-
              {{ range .Alerts }}
              *Service:* {{ .Labels.exported_job }}
              *Severity:* {{ .Labels.severity }}
              *Summary:* {{ .Annotations.summary }}
              {{ end }}
      - name: 'slack-critical'
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/slack-webhook/webhook-url
            channel: '#alerts'
            send_resolved: true
            title: ':rotating_light: {{ .GroupLabels.alertname }}'
            text: >-
              {{ range .Alerts }}
              *Service:* {{ .Labels.exported_job }}
              *Severity:* {{ .Labels.severity }}
              *Summary:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              {{ end }}

kube-state-metrics:
  resources:
    requests:
      cpu: 5m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 5m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

kubeControllerManager:
  enabled: true
kubeScheduler:
  enabled: true
kubeEtcd:
  enabled: true
kubeProxy:
  enabled: true
kubeApiServer:
  enabled: true
