# Tells Prometheus (via the Prometheus Operator, already running as part
# of kube-prometheus-stack) to scrape the OTel Collector's Prometheus-
# format metrics endpoint - this is what actually gets your app-emitted
# metrics (via OTLP) into Prometheus, since the Collector's "prometheus"
# exporter only exposes a /metrics endpoint; something still has to pull it.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: otel-collector
  namespace: monitoring
  labels:
    release: prometheus   # must match the label the Prometheus Operator's
                           # own selector expects (typically the helm
                           # release name) - verify with:
                           # kubectl get prometheus -n monitoring -o yaml | grep -A5 serviceMonitorSelector
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: opentelemetry-collector
  endpoints:
    - port: prometheus
      path: /metrics
      interval: 15s
  namespaceSelector:
    matchNames:
      - monitoring
