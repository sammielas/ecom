apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: ecom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: ghcr.io/sammielas/ecom/order-service:e1401957149ab33b32d00e58188b6eb228af19b2
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
            - name: USER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: ecom-config
                  key: USER_SERVICE_URL
            - name: PRODUCT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: ecom-config
                  key: PRODUCT_SERVICE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: ecom
spec:
  selector:
    app: order-service
  ports:
    - port: 8000
      targetPort: 8000
