# SonarCloud project configuration.
# Create the project at https://sonarcloud.io (free for public repos),
# then replace sammielas and sammielas_ecom below with the values it gives you.

sonar.organization=sammielas
sonar.projectKey=sammielas_ecom
sonar.projectName=ecom

# Scan all three Python services from one root-level analysis
sonar.sources=user-service,product-service,order-service
sonar.exclusions=**/tests/**,**/__pycache__/**

# Point SonarCloud at the tests so it can compute coverage (optional but
# useful - can be wired up later with pytest-cov if you want real numbers)
sonar.tests=user-service/tests,product-service/tests,order-service/tests

sonar.python.version=3.12
