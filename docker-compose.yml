services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  user-service:
    build: ./user-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecommerce
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy

  product-service:
    build: ./product-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecommerce
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  order-service:
    build: ./order-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecommerce
      USER_SERVICE_URL: http://user-service:8000
      PRODUCT_SERVICE_URL: http://product-service:8000
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started
      product-service:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "8090:80"
    depends_on:
      - user-service
      - product-service
      - order-service

volumes:
  pgdata:
